openapi: 3.0.3
info:
  title: Event Management API
  version: 1.0.0
  description: API documentation for the Event Management System
servers:
  - url: http://localhost:3000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [CUSTOMER, ORGANIZER, ADMIN]
        phone:
          type: string
        createdAt:
          type: string
          format: date-time

    Profile:
      type: object
      properties:
        profileId:
          type: string
        userId:
          type: string
        firstname:
          type: string
        lastname:
          type: string
        phone:
          type: string
        city:
          type: string
        subcity:
          type: string
        housenumber:
          type: string
        profilePicture:
          type: string
          description: URL or path to the profile picture
        createdAt:
          type: string
          format: date-time

    Category:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        createdAt:
          type: string
          format: date-time

    events:
      type: object
      properties:
        eventId:
          type: string
        title:
          type: string
        description:
          type: string
        date:
          type: string
          format: date-time
        time:
          type: string  
        location:
          type: string
        capacity:
          type: integer
        status:
          type: string
          enum: [UPCOMING, ONGOING, COMPLETED, CANCELLED]
        organizerId:
          type: string
        categoryId:
          type: string
        createdAt:
          type: string
          format: date-time
    registrations:
      type: object
      properties:
        userId:
          type: string
        eventId:
          type: string
        registration_date:
          type: string
          format: date-time
        status:
          type: string
          enum: [PENDING, CONFIRMED, CANCELLED]
        cancelled_at:
          type: string
          format: date-time

    notifications:
      type: object
      properties:
        notificationId:
          type: string
        userId:
          type: string
        event_id:
          type: string
        message:
          type: string
        type:
          type: string
          enum: [REMAINDER, UPDATE, CAMCELLATION]  
        is_read:
          type: boolean
        sent_at:
          type: string
          format: date-time
        
    
    event_images:
      type: object
      properties:
        image_id:
          type: string
        event_id:
          type: string
        image_url:
          type: string
        caption:
          type: string
        uploaded_at:
          type: string
          format: date-time      

    feedback:
      type: object
      properties:
        feedback_id:
          type: string
        user_id:
          type: string
        event_id:
          type: string
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
        submitted_at:
          type: string
          format: date-time    

    payments:
      type: object
      properties:
        payment_id:
          type: string
        user_id:
          type: string
        event_id:
          type: string
        amount:
          type: number
          format: float
        payment_method:
          type: string
          enum: [CREDIT_CARD, PAYPAL, BANK_TRANSFER]
        transaction_reference:
          type: string  
        payment_status:
          type: string
          enum: [PENDING, SUCCESS, FAILED]
        paid_at:
          type: string
          format: date-time        
paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstname
                - lastname
                - email
                - password
                - role
                - phone
              properties:
                firstname:
                  type: string
                  example: "Yeamlak"
                lastname:
                  type: string
                  example: "sisay"
                email:
                  type: string
                  example: "yeamlak.sisay@example.com"
                  format: email
                password:
                  type: string
                  minLength: 8
                role:
                  type: string
                  enum: [CUSTOMER, ORGANIZER, ADMIN]
                  description: Defaults to CUSTOMER if not provided
                phone:
                  type: string
                  example: "+251912345678"
      responses:
        '201':
          description: Registration successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '400':
          description: Missing/invalid fields
        '409':
          description: Email already exists

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Log in a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - email
                - password
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
                      token:
                        type: string
        '400':
          description: Missing email/password
        '401':
          description: Invalid email or password

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Log out a user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Logout successful
        '401':
          description: Missing, invalid, or already-revoked token
  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get the current authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: User profile returned
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token
        '404':
          description: User not founds

          
  /api/users:
    get:
      tags: [Users]
      summary: List all users
      description: Admin only. Non-admin users will receive a 403.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of users
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      users:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token
        '403':
          description: Not an admin
 
  /api/users/{id}:
    get:
      tags: [Users]
      summary: View one user's info
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "5"
          description: The user's ID
      responses:
        '200':
          description: User found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '401':
          description: Missing or invalid token
        '404':
          description: User not found
 
    put:
      tags: [Users]
      summary: Update user info
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "5"
          description: The user's ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstname:
                  type: string
                lastname:
                  type: string
                email:
                  type: string
                  format: email
                phone:
                  type: string
      responses:
        '200':
          description: User updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/User'
        '400':
          description: Invalid fields
        '401':
          description: Missing or invalid token
        '403':
          description: Not allowed to update this user
        '404':
          description: User not found
 
    delete:
      tags: [Users]
      summary: Delete a user
      description: Admin only. Non-admin users will receive a 403.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "5"
          description: The user's ID
      responses:
        '200':
          description: User deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Missing or invalid token
        '403':
          description: Not an admin
        '404':
          description: User not found



  /api/categories:
    get:
      tags: [Categories]
      summary: Get all event categories
      description: Public endpoint, no auth required.
      responses:
        '200':
          description: List of categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      categories:
                        type: array
                        items:
                          $ref: '#/components/schemas/Category'

    post:
      tags: [Categories]
      summary: Create a new category
      description: Admin only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - name
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '201':
          description: Category created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      category:
                        $ref: '#/components/schemas/Category'
        '400':
          description: Missing/invalid fields
        '401':
          description: Missing or invalid token
        '403':
          description: Not an admin
        '409':
          description: Category already exists

  /api/categories/{id}:
    get:
      tags: [Categories]
      summary: Get a specific category
      description: Public endpoint, no auth required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The category's ID
      responses:
        '200':
          description: Category found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      category:
                        $ref: '#/components/schemas/Category'
        '404':
          description: Category not found

    put:
      tags: [Categories]
      summary: Edit a category
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The category's ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
      responses:
        '200':
          description: Category updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      category:
                        $ref: '#/components/schemas/Category'
        '400':
          description: Invalid fields
        '401':
          description: Missing or invalid token
        '403':
          description: Not an admin
        '404':
          description: Category not found

    delete:
      tags: [Categories]
      summary: Delete a category
      description: Admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The category's ID
      responses:
        '200':
          description: Category deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Missing or invalid token
        '403':
          description: Not an admin
        '404':
          description: Category not found


  /api/profiles:
    post:
      tags: [Profiles]
      summary: Create the profile for a user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - firstname
                - lastname
                - phone
                - city
              properties:
                firstname:
                  type: string
                lastname:
                  type: string
                phone:
                  type: string
                city:
                  type: string
                subcity:
                  type: string
                housenumber:
                  type: string
                profilePicture:
                  type: string
                  description: URL or path to the profile picture
      responses:
        '201':
          description: Profile created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      profile:
                        $ref: '#/components/schemas/Profile'
        '400':
          description: Missing/invalid fields
        '401':
          description: Missing or invalid token
        '409':
          description: Profile already exists for this user
 
  /api/profiles/{userId}:
    get:
      tags: [Profiles]
      summary: View a user's profile
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          example: "5"
          description: The user's ID
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      profile:
                        $ref: '#/components/schemas/Profile'
        '401':
          description: Missing or invalid token
        '404':
          description: Profile not found
 
    put:
      tags: [Profiles]
      summary: Update profile information
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: string
          example: "5"
          description: The user's ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                firstname:
                  type: string
                lastname:
                  type: string
                phone:
                  type: string
                city:
                  type: string
                subcity:
                  type: string
                housenumber:
                  type: string
                profilePicture:
                  type: string
                  description: URL or path to the profile picture
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      profile:
                        $ref: '#/components/schemas/Profile'
        '400':
          description: Invalid fields
        '401':
          description: Missing or invalid token
        '403':
          description: Not allowed to update this profile
        '404':
          description: Profile not found

  /api/events:
    get:
      tags: [Events]
      summary: List all events
      description: Public endpoint, no auth required. Supports pagination and filtering.
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of results per page
        - in: query
          name: categoryId
          schema:
            type: string
          description: Filter by category ID
        - in: query
          name: status
          schema:
            type: string
            enum: [UPCOMING, ONGOING, COMPLETED, CANCELLED]
          description: Filter by event status
        - in: query
          name: search
          schema:
            type: string
          description: Search by event title
      responses:
        '200':
          description: List of events
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      events:
                        type: array
                        items:
                          $ref: '#/components/schemas/events'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalPages:
                            type: integer

    post:
      tags: [Events]
      summary: Create a new event
      description: Organizer only.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - date
                - time
                - location
                - capacity
                - categoryId
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                  format: date-time
                time:
                  type: string
                location:
                  type: string
                capacity:
                  type: integer
                categoryId:
                  type: string
      responses:
        '201':
          description: Event created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/events'
        '400':
          description: Missing/invalid fields
        '401':
          description: Missing or invalid token
        '403':
          description: Not an organizer

  /api/events/{id}:
    get:
      tags: [Events]
      summary: Get a specific event
      description: Public endpoint, no auth required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The event's ID
      responses:
        '200':
          description: Event found
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/events'
        '404':
          description: Event not found

    put:
      tags: [Events]
      summary: Update an event
      description: Organizer (owner) only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The event's ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                date:
                  type: string
                  format: date-time
                time:
                  type: string
                location:
                  type: string
                capacity:
                  type: integer
                categoryId:
                  type: string
      responses:
        '200':
          description: Event updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/events'
        '400':
          description: Invalid fields
        '401':
          description: Missing or invalid token
        '403':
          description: Not the event owner
        '404':
          description: Event not found

    delete:
      tags: [Events]
      summary: Delete an event
      description: Organizer (owner) or admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The event's ID
      responses:
        '200':
          description: Event deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
        '401':
          description: Missing or invalid token
        '403':
          description: Not the event owner or an admin
        '404':
          description: Event not found

  /api/events/{id}/status:
    patch:
      tags: [Events]
      summary: Update an event's status
      description: Organizer (owner) or admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The event's ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [UPCOMING, ONGOING, COMPLETED, CANCELLED]
      responses:
        '200':
          description: Status updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      event:
                        $ref: '#/components/schemas/events'
        '400':
          description: Invalid status value
        '401':
          description: Missing or invalid token
        '403':
          description: Not the event owner or an admin
        '404':
          description: Event not found

  /api/events/{id}/feedback:
    get:
      tags: [Events]
      summary: List feedback for an event
      description: Public endpoint, no auth required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The event's ID
      responses:
        '200':
          description: List of feedback
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      feedback:
                        type: array
                        items:
                          $ref: '#/components/schemas/feedback'
        '404':
          description: Event not found

  /api/events/{id}/registrations:
    get:
      tags: [Events]
      summary: List registrations for an event
      description: Organizer (owner) or admin only.
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "3"
          description: The event's ID
        - in: query
          name: page
          schema:
            type: integer
            default: 1
          description: Page number
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
          description: Number of results per page
        - in: query
          name: status
          schema:
            type: string
            enum: [PENDING, CONFIRMED, CANCELLED]
          description: Filter by registration status
      responses:
        '200':
          description: List of registrations
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      registrations:
                        type: array
                        items:
                          $ref: '#/components/schemas/registrations'
                      pagination:
                        type: object
                        properties:
                          total:
                            type: integer
                          page:
                            type: integer
                          limit:
                            type: integer
                          totalPages:
                            type: integer
        '401':
          description: Missing or invalid token
        '403':
          description: Not the event owner or an admin
        '404':
          description: Event not found        

  /api/events/{id}/images:
    get:
      tags: [Events]
      summary: List images for an event
      description: Public endpoint, no auth required.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: The event's ID
      responses:
        '200':
          description: List of event images
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      images:
                        type: array
                        items:
                          $ref: '#/components/schemas/event_images'
                      total:
                        type: integer
